<script>
        const carousel = document.getElementById('carousel');
        const progressBar = document.getElementById('progress-bar');
        const slideNum = document.getElementById('slide-num');
        const totalSlides = 3;
        let currentSlide = 0;

        function scrollCarousel(direction) {
            if (direction === 'right') {
                currentSlide = (currentSlide + 1) % totalSlides;
            } else {
                currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            }
            
            carousel.scrollTo({
                left: window.innerWidth * currentSlide,
                behavior: 'smooth'
            });

            updateProgress();
        }

        function updateProgress() {
            const percentage = ((currentSlide + 1) / totalSlides) * 100;
            progressBar.style.width = `${percentage}%`;
            slideNum.innerText = `0${currentSlide + 1} / 03`;
        }

        // Auto-scroll logic for "slow scrolling"
        let autoScroll = setInterval(() => {
            scrollCarousel('right');
        }, 8000);

        // Pause auto-scroll on interaction
        carousel.addEventListener('mousedown', () => clearInterval(autoScroll));
        carousel.addEventListener('touchstart', () => clearInterval(autoScroll));

        // Intersection Observer to detect scroll state if user manual scrolls
        carousel.addEventListener('scroll', () => {
            const index = Math.round(carousel.scrollLeft / window.innerWidth);
            if (index !== currentSlide) {
                currentSlide = index;
                updateProgress();
            }
        });
    </script>
